name: Deploy IPTV Worker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy Worker
        run: |
          wrangler deploy \
          --var HOST:${{ secrets.HOST }} \
          --var MAC:${{ secrets.MAC }} \
          --var SERIAL:${{ secrets.SERIAL }} \
          --var DEVICE1:${{ secrets.DEVICE1 }} \
          --var DEVICE2:${{ secrets.DEVICE2 }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
